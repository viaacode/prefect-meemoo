name: CI

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches: [main, release]
    tags: [v*]


jobs:

  calculate-environment:
    runs-on:
      group: Default
      labels: [self-hosted]
    name: Calculate environment
    steps:
      - name: Check int
        if: startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, 'a')
        run: echo "deploy_to=int" >> "$GITHUB_ENV"
      - name: Check qas
        if: startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, 'b')
        run: echo "deploy_to=qas" >> "$GITHUB_ENV"
      - name: Check prd
        if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, 'a') && !contains(github.ref_name, 'b')
        run: echo "deploy_to=prd" >> "$GITHUB_ENV"

  build-docker-image:
    environment: prefect-v3-graaf
    runs-on:
      group: Default
      labels: [self-hosted]
    name: Build docker image
    outputs:
      image_name: ${{ steps.image_name.outputs.image_name }}
    steps:
      - name: Image name
        id: image_name
        run: |
          SHORT_GIT_HASH="${GITHUB_SHA::7}"
          IMAGE_NAME="${{ vars.DOCKER_REGISTRY }}/prefect/prefect-meemoo-dev:${SHORT_GIT_HASH}"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ${{ steps.image_name.outputs.image_name }}
          build-args: PIP_ARGS=${{ vars.PIP_ARGS }}

  lint-and-test:
    needs: build-docker-image
    runs-on:
      group: Default
      labels: [self-hosted]
    name: Lint / static checks / test code
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run linting
        run: docker run --rm --entrypoint prefect "${{ needs.build-docker-image.outputs.image_name }}" --version
